<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notre Livre d'Or - Mariage</title>
    <!-- Bibliothèques -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .mirror-mode { transform: scaleX(-1); }
        .pulse-ring { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.05); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="root"></div>

    <!-- Scripts Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, Timestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Exposer Firebase au scope global proprement
        window.FirebaseBridge = {
            auth, 
            db, 
            collection, 
            addDoc, 
            onSnapshot, 
            Timestamp, 
            onAuthStateChanged, 
            signInAnonymously,
            isReady: true
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Composants Icônes SVG
        const IconHeart = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>;
        const IconMic = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 8-9.04 9.06a2.82 2.82 0 1 0 3.98 3.98L16 12"/><circle cx="17" cy="7" r="5"/></svg>;
        const IconVideo = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 13 5.223 3.482a.5.5 0 0 0 .777-.416V7.934a.5.5 0 0 0-.777-.416L16 11"/><rect width="14" height="12" x="2" y="6" rx="2"/></svg>;
        const IconLock = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const IconUnlock = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V5a5 5 0 0 1 9.9-1"/></svg>;
        const IconSquare = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>;

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('record'); 
            const [mediaMode, setMediaMode] = useState('audio');
            const [isRecording, setIsRecording] = useState(false);
            const [mediaURL, setMediaURL] = useState(null);
            const [mediaBlob, setMediaBlob] = useState(null);
            const [guestName, setGuestName] = useState('');
            const [pinInput, setPinInput] = useState('');
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [showPinError, setShowPinError] = useState(false);
            const [messages, setMessages] = useState([]);
            const [isUploading, setIsUploading] = useState(false);

            const mediaRecorderRef = useRef(null);
            const streamRef = useRef(null);
            const chunksRef = useRef([]);
            const videoPreviewRef = useRef(null);
            
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'livre-d-or-b68e5';
            const ADMIN_PIN = "1234";

            // Init Firebase Auth
            useEffect(() => {
                const checkFirebase = setInterval(() => {
                    if (window.FirebaseBridge && window.FirebaseBridge.isReady) {
                        clearInterval(checkFirebase);
                        const { auth, onAuthStateChanged, signInAnonymously } = window.FirebaseBridge;
                        const unsubscribe = onAuthStateChanged(auth, (u) => {
                            if (!u) signInAnonymously(auth).catch(e => console.error("Auth:", e));
                            setUser(u);
                        });
                        return () => unsubscribe();
                    }
                }, 200);
                return () => clearInterval(checkFirebase);
            }, []);

            // Listener Firestore (Archives)
            useEffect(() => {
                if (!user || !isAuthenticated || !window.FirebaseBridge?.isReady) return;
                const { db, collection, onSnapshot } = window.FirebaseBridge;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
                const unsubscribe = onSnapshot(q, (snap) => {
                    setMessages(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                        .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)));
                }, (err) => console.error("Firestore:", err));
                return () => unsubscribe();
            }, [user, isAuthenticated]);

            const startRecording = async () => {
                try {
                    const constraints = { 
                        audio: true, 
                        video: mediaMode === 'video' ? { width: 640, height: 480, facingMode: 'user' } : false 
                    };
                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    streamRef.current = stream;

                    if (mediaMode === 'video' && videoPreviewRef.current) {
                        videoPreviewRef.current.srcObject = stream;
                    }

                    const options = { mimeType: mediaMode === 'video' ? 'video/webm;codecs=vp8,opus' : 'audio/webm' };
                    mediaRecorderRef.current = new MediaRecorder(stream, options);
                    chunksRef.current = [];

                    mediaRecorderRef.current.ondataavailable = (e) => {
                        if (e.data.size > 0) chunksRef.current.push(e.data);
                    };

                    mediaRecorderRef.current.onstop = () => {
                        const blob = new Blob(chunksRef.current, { type: mediaMode === 'video' ? 'video/webm' : 'audio/webm' });
                        setMediaBlob(blob);
                        setMediaURL(URL.createObjectURL(blob));
                        // Arrêter les flux
                        if (streamRef.current) {
                            streamRef.current.getTracks().forEach(track => track.stop());
                        }
                    };

                    mediaRecorderRef.current.start();
                    setIsRecording(true);
                } catch (err) { 
                    alert("Impossible d'accéder à la caméra ou au micro. Vérifiez les permissions."); 
                }
            };

            const stopRecording = () => {
                if (mediaRecorderRef.current && isRecording) {
                    mediaRecorderRef.current.stop();
                    setIsRecording(false);
                }
            };

            const saveMessage = async () => {
                if (!mediaBlob || !guestName.trim() || !window.FirebaseBridge.isReady) return;
                
                // Vérification de sécurité pour la taille (max 1Mo pour Firestore base64)
                if (mediaBlob.size > 1500000) {
                    alert("Le fichier est trop volumineux. Essayez d'enregistrer un message plus court (moins de 30s).");
                    return;
                }

                setIsUploading(true);
                const reader = new FileReader();
                reader.readAsDataURL(mediaBlob);
                reader.onloadend = async () => {
                    try {
                        const { db, collection, addDoc, Timestamp } = window.FirebaseBridge;
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {
                            name: guestName,
                            mediaData: reader.result,
                            type: mediaMode,
                            timestamp: Timestamp.now(),
                            userId: user?.uid || 'anonymous'
                        });
                        
                        setMediaURL(null);
                        setMediaBlob(null);
                        setGuestName('');
                        setIsUploading(false);
                        alert("Souvenir enregistré ! Merci ❤️");
                        if (isAuthenticated) setView('listen');
                    } catch (e) { 
                        console.error("Upload error:", e);
                        alert("Erreur réseau ou fichier trop gros. Réessayez avec un message plus court."); 
                        setIsUploading(false); 
                    }
                };
            };

            return (
                <div className="p-4 md:p-8 max-w-2xl mx-auto">
                    <header className="text-center mb-8">
                        <div className="flex justify-center mb-4 text-rose-500">
                            <div className="bg-rose-100 p-3 rounded-full shadow-inner animate-bounce">
                                <IconHeart />
                            </div>
                        </div>
                        <h1 className="text-4xl font-serif font-bold text-slate-800 mb-2">Livre d'Or de Mariage</h1>
                        <p className="text-slate-500 italic">Un petit message, un grand souvenir</p>
                    </header>

                    <nav className="flex gap-2 mb-8 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-200">
                        <button 
                            onClick={() => { setView('record'); setMediaURL(null); }}
                            className={`flex-1 py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-all ${view === 'record' ? 'bg-rose-500 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}
                        >
                            <IconMic /> Enregistrer
                        </button>
                        <button 
                            onClick={() => setView('listen')}
                            className={`flex-1 py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-all ${view === 'listen' ? 'bg-rose-500 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}
                        >
                            {isAuthenticated ? <IconUnlock /> : <IconLock />} Voir les Archives
                        </button>
                    </nav>

                    <main>
                        {view === 'record' ? (
                            <div className="bg-white rounded-3xl shadow-xl p-6 md:p-10 text-center border border-slate-100">
                                {!mediaURL ? (
                                    <>
                                        <div className="mb-8 text-left">
                                            <label className="block text-sm font-bold mb-2 text-slate-700 ml-1">Comment vous appelez-vous ?</label>
                                            <input 
                                                value={guestName} 
                                                onChange={(e) => setGuestName(e.target.value)}
                                                className="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 focus:border-rose-300 focus:ring-0 outline-none transition-all text-lg"
                                                placeholder="Julie, Famille Martin..."
                                            />
                                        </div>
                                        
                                        <div className="flex bg-slate-100 p-1 rounded-xl mb-8">
                                            <button 
                                                onClick={() => setMediaMode('audio')}
                                                disabled={isRecording}
                                                className={`flex-1 py-2.5 rounded-lg text-sm font-bold transition-all ${mediaMode === 'audio' ? 'bg-white shadow text-rose-600' : 'text-slate-500'}`}
                                            >Micro Uniquement</button>
                                            <button 
                                                onClick={() => setMediaMode('video')}
                                                disabled={isRecording}
                                                className={`flex-1 py-2.5 rounded-lg text-sm font-bold transition-all ${mediaMode === 'video' ? 'bg-white shadow text-rose-600' : 'text-slate-500'}`}
                                            >Mode Vidéo</button>
                                        </div>

                                        <div className="relative flex flex-col items-center justify-center min-h-[200px]">
                                            {mediaMode === 'video' && isRecording && (
                                                <video ref={videoPreviewRef} autoPlay muted className="w-full aspect-video bg-black rounded-3xl mb-6 mirror-mode object-cover shadow-2xl"></video>
                                            )}
                                            {isRecording && mediaMode === 'audio' && (
                                                <div className="w-40 h-40 mb-6 bg-rose-100 rounded-full pulse-ring flex items-center justify-center text-rose-500 shadow-inner">
                                                    <IconMic />
                                                </div>
                                            )}
                                            
                                            <button
                                                onClick={isRecording ? stopRecording : startRecording}
                                                disabled={!guestName.trim()}
                                                className={`w-24 h-24 rounded-full flex items-center justify-center shadow-2xl transition-all active:scale-90 transform ${isRecording ? 'bg-slate-800 animate-pulse' : 'bg-rose-500 hover:bg-rose-600'} text-white disabled:opacity-30`}
                                            >
                                                {isRecording ? <IconSquare /> : (mediaMode === 'audio' ? <IconMic /> : <IconVideo />)}
                                            </button>
                                            <p className={`mt-6 font-bold tracking-wide ${isRecording ? 'text-rose-500' : 'text-slate-400'}`}>
                                                {isRecording ? "ENREGISTREMENT EN COURS..." : "APPUYEZ POUR DÉMARRER"}
                                            </p>
                                        </div>
                                    </>
                                ) : (
                                    <div className="space-y-8 animate-in zoom-in-95 duration-300">
                                        <h3 className="text-xl font-bold text-slate-800">C'est parfait ! On l'envoie ?</h3>
                                        <div className="bg-slate-900 p-2 rounded-3xl shadow-2xl overflow-hidden">
                                            {mediaMode === 'video' ? (
                                                <video src={mediaURL} controls className="w-full rounded-2xl"></video>
                                            ) : (
                                                <div className="p-8 flex items-center justify-center bg-rose-50 rounded-2xl">
                                                    <audio src={mediaURL} controls className="w-full"></audio>
                                                </div>
                                            )}
                                        </div>
                                        <div className="flex gap-4">
                                            <button 
                                                onClick={() => {setMediaURL(null); setMediaBlob(null);}} 
                                                className="flex-1 py-4 border-2 border-slate-200 rounded-2xl text-slate-600 hover:bg-slate-50 font-bold transition-all"
                                            >
                                                Recommencer
                                            </button>
                                            <button 
                                                onClick={saveMessage} 
                                                disabled={isUploading} 
                                                className="flex-1 py-4 bg-emerald-500 text-white rounded-2xl shadow-lg hover:bg-emerald-600 disabled:opacity-50 font-black text-lg transition-all"
                                            >
                                                {isUploading ? "Envoi..." : "ENVOYER ❤️"}
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : (
                            // Archives
                            !isAuthenticated ? (
                                <div className="bg-white rounded-3xl shadow-xl p-10 text-center border border-slate-100">
                                    <div className="text-slate-300 mb-6 flex justify-center scale-150">
                                        <IconLock />
                                    </div>
                                    <h2 className="text-2xl font-serif font-bold mb-2 text-slate-800">Espace Privé</h2>
                                    <p className="text-slate-500 mb-8">Entrez le code pour découvrir vos messages.</p>
                                    <form onSubmit={(e) => {
                                        e.preventDefault();
                                        if (pinInput === ADMIN_PIN) setIsAuthenticated(true);
                                        else { setShowPinError(true); setPinInput(''); }
                                    }} className="max-w-xs mx-auto">
                                        <input 
                                            type="password" 
                                            inputMode="numeric"
                                            value={pinInput} 
                                            onChange={(e) => setPinInput(e.target.value)}
                                            placeholder="Code PIN" 
                                            className={`w-full text-center text-3xl tracking-[0.4em] p-4 rounded-2xl border-2 focus:ring-0 outline-none mb-6 transition-all ${showPinError ? 'border-rose-500 bg-rose-50' : 'border-slate-100 focus:border-rose-400'}`} 
                                        />
                                        <button className="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold hover:bg-slate-900 shadow-xl transition-all active:scale-95">Déverrouiller</button>
                                    </form>
                                </div>
                            ) : (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                                        <h3 className="font-bold text-slate-800">Souvenirs ({messages.length})</h3>
                                        <button onClick={() => setIsAuthenticated(false)} className="text-xs bg-slate-100 px-3 py-1 rounded-full text-slate-500 hover:bg-slate-200">Quitter</button>
                                    </div>
                                    {messages.length === 0 ? (
                                        <div className="bg-white rounded-3xl p-16 text-center border-2 border-dashed border-slate-200 text-slate-400 italic">Aucun message pour l'instant. Soyez le premier !</div>
                                    ) : (
                                        messages.map(msg => (
                                            <div key={msg.id} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 animate-in slide-in-from-bottom-4 duration-500">
                                                <div className="flex items-center gap-4 mb-4">
                                                    <div className="w-12 h-12 bg-rose-50 rounded-2xl flex items-center justify-center text-rose-500 shadow-inner">
                                                        {msg.type === 'video' ? <IconVideo /> : <IconMic />}
                                                    </div>
                                                    <div className="flex-1">
                                                        <h4 className="font-bold text-slate-800 text-lg leading-tight">{msg.name}</h4>
                                                        <span className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                                                            {msg.timestamp?.toDate().toLocaleString('fr-FR', { day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' })}
                                                        </span>
                                                    </div>
                                                </div>
                                                <div className="bg-slate-50 rounded-2xl overflow-hidden p-1">
                                                    {msg.type === 'video' ? (
                                                        <video src={msg.mediaData} controls className="w-full rounded-xl"></video>
                                                    ) : (
                                                        <audio src={msg.mediaData} controls className="w-full h-12 mt-2"></audio>
                                                    )}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            )
                        )}
                    </main>
                    <footer className="mt-16 text-center text-slate-300 text-[10px] py-8 border-t border-slate-100 uppercase tracking-widest font-bold">
                        Votre Mariage • Livre d'Or Virtuel
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
