<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notre Livre d'Or - Mariage</title>
    <!-- Bibliothèques -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .mirror-mode { transform: scaleX(-1); }
        .pulse-ring { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.05); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="root"></div>

    <!-- Scripts Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, Timestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Exposer Firebase au scope global proprement
        window.FirebaseBridge = {
            auth, 
            db, 
            collection, 
            addDoc, 
            onSnapshot, 
            Timestamp, 
            onAuthStateChanged, 
            signInAnonymously,
            isReady: true
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Composants Icônes SVG pour éviter les conflits Lucide/React
        const IconHeart = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="lucide lucide-heart"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>;
        const IconMic = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="lucide lucide-mic"><path d="m12 8-9.04 9.06a2.82 2.82 0 1 0 3.98 3.98L16 12"/><circle cx="17" cy="7" r="5"/></svg>;
        const IconVideo = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="lucide lucide-video"><path d="m16 13 5.223 3.482a.5.5 0 0 0 .777-.416V7.934a.5.5 0 0 0-.777-.416L16 11"/><rect width="14" height="12" x="2" y="6" rx="2"/></svg>;
        const IconLock = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="lucide lucide-lock"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const IconUnlock = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="lucide lucide-lock-open"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V5a5 5 0 0 1 9.9-1"/></svg>;
        const IconSquare = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="lucide lucide-square"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>;

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('record'); 
            const [mediaMode, setMediaMode] = useState('audio');
            const [isRecording, setIsRecording] = useState(false);
            const [mediaURL, setMediaURL] = useState(null);
            const [mediaBlob, setMediaBlob] = useState(null);
            const [guestName, setGuestName] = useState('');
            const [pinInput, setPinInput] = useState('');
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [showPinError, setShowPinError] = useState(false);
            const [messages, setMessages] = useState([]);
            const [isUploading, setIsUploading] = useState(false);

            const mediaRecorderRef = useRef(null);
            const chunksRef = useRef([]);
            const videoPreviewRef = useRef(null);
            
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'livre-d-or-b68e5';
            const ADMIN_PIN = "1234";

            // Initialisation Auth
            useEffect(() => {
                const checkFirebase = setInterval(() => {
                    if (window.FirebaseBridge && window.FirebaseBridge.isReady) {
                        clearInterval(checkFirebase);
                        const { auth, onAuthStateChanged, signInAnonymously } = window.FirebaseBridge;
                        
                        const unsubscribe = onAuthStateChanged(auth, (u) => {
                            if (!u) {
                                signInAnonymously(auth).catch(err => console.error("Auth error:", err));
                            }
                            setUser(u);
                        });
                        return () => unsubscribe();
                    }
                }, 100);
                return () => clearInterval(checkFirebase);
            }, []);

            // Chargement des messages
            useEffect(() => {
                if (!user || !isAuthenticated || !window.FirebaseBridge || !window.FirebaseBridge.isReady) return;
                
                const { db, collection, onSnapshot } = window.FirebaseBridge;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
                
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const msgs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                        .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    setMessages(msgs);
                }, (error) => {
                    console.error("Firestore Error:", error);
                });
                
                return () => unsubscribe();
            }, [user, isAuthenticated]);

            const startRecording = async () => {
                try {
                    const constraints = { 
                        audio: true, 
                        video: mediaMode === 'video' ? { facingMode: 'user' } : false 
                    };
                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    
                    if (mediaMode === 'video' && videoPreviewRef.current) {
                        videoPreviewRef.current.srcObject = stream;
                    }

                    mediaRecorderRef.current = new MediaRecorder(stream);
                    chunksRef.current = [];
                    mediaRecorderRef.current.ondataavailable = (e) => {
                        if (e.data.size > 0) chunksRef.current.push(e.data);
                    };
                    mediaRecorderRef.current.onstop = () => {
                        const blob = new Blob(chunksRef.current, { type: mediaMode === 'video' ? 'video/webm' : 'audio/webm' });
                        setMediaBlob(blob);
                        setMediaURL(URL.createObjectURL(blob));
                        stream.getTracks().forEach(track => track.stop());
                    };
                    mediaRecorderRef.current.start();
                    setIsRecording(true);
                } catch (err) { 
                    alert("Erreur d'accès micro/caméra. Veuillez autoriser l'accès."); 
                }
            };

            const stopRecording = () => {
                if (mediaRecorderRef.current && isRecording) {
                    mediaRecorderRef.current.stop();
                    setIsRecording(false);
                }
            };

            const saveMessage = async () => {
                if (!mediaBlob || !guestName.trim() || !window.FirebaseBridge.isReady) return;
                setIsUploading(true);
                
                const reader = new FileReader();
                reader.readAsDataURL(mediaBlob);
                reader.onloadend = async () => {
                    try {
                        const { db, collection, addDoc, Timestamp } = window.FirebaseBridge;
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {
                            name: guestName,
                            mediaData: reader.result,
                            type: mediaMode,
                            timestamp: Timestamp.now(),
                            userId: user?.uid || 'anonymous'
                        });
                        setMediaURL(null);
                        setMediaBlob(null);
                        setGuestName('');
                        setIsUploading(false);
                        if (isAuthenticated) setView('listen');
                        else alert("Message envoyé avec succès ! ❤️");
                    } catch (e) { 
                        console.error("Upload error:", e);
                        alert("Erreur lors de l'envoi."); 
                        setIsUploading(false); 
                    }
                };
            };

            return (
                <div className="p-4 md:p-8">
                    <header className="max-w-2xl mx-auto text-center mb-8">
                        <div className="flex justify-center mb-4 text-rose-500">
                            <div className="bg-rose-100 p-3 rounded-full">
                                <IconHeart />
                            </div>
                        </div>
                        <h1 className="text-4xl font-serif font-bold text-slate-800 mb-2">Notre Livre d'Or</h1>
                        <p className="text-slate-500 italic">Laissez-nous un souvenir vocal ou vidéo</p>
                    </header>

                    <nav className="max-w-md mx-auto flex gap-2 mb-8 bg-white p-1 rounded-xl shadow-sm border border-slate-200">
                        <button 
                            onClick={() => setView('record')}
                            className={`flex-1 py-2 px-4 rounded-lg flex items-center justify-center gap-2 transition-all ${view === 'record' ? 'bg-rose-500 text-white shadow-md' : 'text-slate-500'}`}
                        >
                            <IconMic /> Enregistrer
                        </button>
                        <button 
                            onClick={() => setView('listen')}
                            className={`flex-1 py-2 px-4 rounded-lg flex items-center justify-center gap-2 transition-all ${view === 'listen' ? 'bg-rose-500 text-white shadow-md' : 'text-slate-500'}`}
                        >
                            {isAuthenticated ? <IconUnlock /> : <IconLock />} Archives
                        </button>
                    </nav>

                    <main className="max-w-lg mx-auto">
                        {view === 'record' ? (
                            <div className="bg-white rounded-3xl shadow-xl p-6 md:p-8 text-center border border-slate-100">
                                {!mediaURL ? (
                                    <>
                                        <div className="mb-6 text-left">
                                            <label className="block text-sm font-medium mb-2 text-slate-700">Votre Nom / Famille</label>
                                            <input 
                                                value={guestName} 
                                                onChange={(e) => setGuestName(e.target.value)}
                                                className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-rose-500 outline-none"
                                                placeholder="Ex: Julie & Marc"
                                            />
                                        </div>
                                        <div className="flex bg-slate-100 p-1 rounded-lg mb-6">
                                            <button 
                                                onClick={() => setMediaMode('audio')}
                                                disabled={isRecording}
                                                className={`flex-1 py-1.5 rounded-md text-sm font-medium transition-all ${mediaMode === 'audio' ? 'bg-white shadow text-rose-600' : 'text-slate-500'}`}
                                            >Audio</button>
                                            <button 
                                                onClick={() => setMediaMode('video')}
                                                disabled={isRecording}
                                                className={`flex-1 py-1.5 rounded-md text-sm font-medium transition-all ${mediaMode === 'video' ? 'bg-white shadow text-rose-600' : 'text-slate-500'}`}
                                            >Vidéo</button>
                                        </div>
                                        <div className="relative flex flex-col items-center">
                                            {mediaMode === 'video' && isRecording && (
                                                <video ref={videoPreviewRef} autoPlay muted className="w-full aspect-video bg-black rounded-2xl mb-4 mirror-mode object-cover"></video>
                                            )}
                                            {isRecording && mediaMode === 'audio' && (
                                                <div className="w-32 h-32 mb-4 bg-rose-100 rounded-full pulse-ring flex items-center justify-center text-rose-500">
                                                    <IconMic />
                                                </div>
                                            )}
                                            <button
                                                onClick={isRecording ? stopRecording : startRecording}
                                                disabled={!guestName.trim()}
                                                className={`w-20 h-20 rounded-full flex items-center justify-center shadow-lg transition-all active:scale-95 ${isRecording ? 'bg-slate-800' : 'bg-rose-500'} text-white disabled:opacity-50`}
                                            >
                                                {isRecording ? <IconSquare /> : (mediaMode === 'audio' ? <IconMic /> : <IconVideo />)}
                                            </button>
                                            <p className="mt-4 text-slate-600 font-medium">{isRecording ? "On vous écoute..." : "Appuyez pour commencer"}</p>
                                        </div>
                                    </>
                                ) : (
                                    <div className="space-y-6">
                                        <div className="bg-rose-50 p-4 rounded-2xl border border-rose-100">
                                            {mediaMode === 'video' ? (
                                                <video src={mediaURL} controls className="w-full rounded-lg shadow-sm"></video>
                                            ) : (
                                                <audio src={mediaURL} controls className="w-full"></audio>
                                            )}
                                        </div>
                                        <div className="flex gap-3">
                                            <button onClick={() => setMediaURL(null)} className="flex-1 py-3 border border-slate-200 rounded-xl text-slate-600 hover:bg-slate-50 font-medium">Recommencer</button>
                                            <button 
                                                onClick={saveMessage} 
                                                disabled={isUploading} 
                                                className="flex-1 py-3 bg-emerald-500 text-white rounded-xl shadow-lg hover:bg-emerald-600 disabled:opacity-50 font-bold"
                                            >
                                                {isUploading ? "Envoi..." : "Envoyer ❤️"}
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : (
                            !isAuthenticated ? (
                                <div className="bg-white rounded-3xl shadow-xl p-8 text-center border border-slate-100">
                                    <div className="text-slate-300 mb-4 flex justify-center">
                                        <IconLock />
                                    </div>
                                    <h2 className="text-xl font-bold mb-2 text-slate-800">Espace Mariés</h2>
                                    <form onSubmit={(e) => {
                                        e.preventDefault();
                                        if (pinInput === ADMIN_PIN) setIsAuthenticated(true);
                                        else { setShowPinError(true); setPinInput(''); }
                                    }}>
                                        <input 
                                            type="password" 
                                            inputMode="numeric"
                                            value={pinInput} 
                                            onChange={(e) => setPinInput(e.target.value)}
                                            placeholder="****" 
                                            className={`w-full text-center text-3xl tracking-[0.5em] p-3 rounded-xl border focus:ring-2 outline-none mb-4 ${showPinError ? 'border-rose-500 ring-rose-50' : 'border-slate-200 focus:ring-rose-500'}`} 
                                        />
                                        <button className="w-full py-4 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-900 shadow-lg">Déverrouiller</button>
                                    </form>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    <div className="flex justify-between items-center mb-4 px-2">
                                        <h3 className="font-bold text-slate-800">Messages ({messages.length})</h3>
                                        <button onClick={() => setIsAuthenticated(false)} className="text-xs text-slate-400 underline">Quitter</button>
                                    </div>
                                    {messages.length === 0 ? (
                                        <div className="bg-white rounded-2xl p-10 text-center border border-dashed border-slate-300 text-slate-400 italic">Aucun message pour le moment.</div>
                                    ) : (
                                        messages.map(msg => (
                                            <div key={msg.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                                                <div className="flex items-center gap-3 mb-3">
                                                    <div className="w-10 h-10 bg-rose-50 rounded-full flex items-center justify-center text-rose-500">
                                                        {msg.type === 'video' ? <IconVideo /> : <IconMic />}
                                                    </div>
                                                    <div>
                                                        <h4 className="font-bold text-slate-800">{msg.name}</h4>
                                                        <span className="text-[10px] text-slate-400 uppercase tracking-wider">
                                                            {msg.timestamp?.toDate().toLocaleString('fr-FR')}
                                                        </span>
                                                    </div>
                                                </div>
                                                {msg.type === 'video' ? (
                                                    <video src={msg.mediaData} controls className="w-full rounded-lg shadow-inner"></video>
                                                ) : (
                                                    <audio src={msg.mediaData} controls className="w-full h-10"></audio>
                                                )}
                                            </div>
                                        ))
                                    )}
                                </div>
                            )
                        )}
                    </main>
                    <footer className="mt-12 text-center text-slate-300 text-[10px] py-8 uppercase tracking-widest">
                        Livre d'Or Virtuel • livre-d-or-b68e5
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
