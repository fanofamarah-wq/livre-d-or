<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notre Livre d'Or - Mariage</title>
    <!-- Bibliothèques -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .mirror-mode { transform: scaleX(-1); }
        .pulse-ring { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.05); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="root"></div>

    <!-- Scripts Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, Timestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.FirebaseBridge = {
            auth, db, collection, addDoc, onSnapshot, Timestamp, 
            onAuthStateChanged, signInAnonymously, isReady: true
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Icônes SVG
        const IconHeart = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>;
        const IconMic = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 8-9.04 9.06a2.82 2.82 0 1 0 3.98 3.98L16 12"/><circle cx="17" cy="7" r="5"/></svg>;
        const IconVideo = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 13 5.223 3.482a.5.5 0 0 0 .777-.416V7.934a.5.5 0 0 0-.777-.416L16 11"/><rect width="14" height="12" x="2" y="6" rx="2"/></svg>;
        const IconLock = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const IconSquare = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>;

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('record'); 
            const [mediaMode, setMediaMode] = useState('audio');
            const [isRecording, setIsRecording] = useState(false);
            const [mediaURL, setMediaURL] = useState(null);
            const [mediaBlob, setMediaBlob] = useState(null);
            const [guestName, setGuestName] = useState('');
            const [pinInput, setPinInput] = useState('');
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [messages, setMessages] = useState([]);
            const [isUploading, setIsUploading] = useState(false);

            const mediaRecorderRef = useRef(null);
            const streamRef = useRef(null);
            const chunksRef = useRef([]);
            const videoPreviewRef = useRef(null);
            
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'livre-d-or-default';
            const ADMIN_PIN = "1234";
            const MAX_SIZE_BYTES = 1000000; // ~1Mo pour Firestore

            useEffect(() => {
                const checkFirebase = setInterval(() => {
                    if (window.FirebaseBridge?.isReady) {
                        clearInterval(checkFirebase);
                        const { auth, onAuthStateChanged, signInAnonymously } = window.FirebaseBridge;
                        const unsubscribe = onAuthStateChanged(auth, (u) => {
                            if (!u) signInAnonymously(auth).catch(e => console.error("Auth:", e));
                            setUser(u);
                        });
                        return () => unsubscribe();
                    }
                }, 200);
                return () => clearInterval(checkFirebase);
            }, []);

            useEffect(() => {
                if (!user || !isAuthenticated || !window.FirebaseBridge?.isReady) return;
                const { db, collection, onSnapshot } = window.FirebaseBridge;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
                return onSnapshot(q, (snap) => {
                    setMessages(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                        .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)));
                });
            }, [user, isAuthenticated]);

            const startRecording = async () => {
                try {
                    const constraints = { 
                        audio: true, 
                        video: mediaMode === 'video' ? { 
                            width: { ideal: 320 }, 
                            height: { ideal: 240 }, 
                            frameRate: { ideal: 15 },
                            facingMode: 'user' 
                        } : false 
                    };
                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    streamRef.current = stream;

                    if (mediaMode === 'video' && videoPreviewRef.current) {
                        videoPreviewRef.current.srcObject = stream;
                    }

                    // Forcer un débit binaire bas pour réduire le poids
                    const options = { 
                        mimeType: mediaMode === 'video' ? 'video/webm;codecs=vp8' : 'audio/webm',
                        videoBitsPerSecond: 250000 // 250kbps
                    };
                    
                    mediaRecorderRef.current = new MediaRecorder(stream, options);
                    chunksRef.current = [];

                    mediaRecorderRef.current.ondataavailable = (e) => {
                        if (e.data.size > 0) chunksRef.current.push(e.data);
                    };

                    mediaRecorderRef.current.onstop = () => {
                        const blob = new Blob(chunksRef.current, { type: mediaMode === 'video' ? 'video/webm' : 'audio/webm' });
                        setMediaBlob(blob);
                        setMediaURL(URL.createObjectURL(blob));
                        if (streamRef.current) {
                            streamRef.current.getTracks().forEach(track => track.stop());
                        }
                    };

                    mediaRecorderRef.current.start();
                    setIsRecording(true);
                } catch (err) { 
                    alert("Accès refusé ou impossible."); 
                }
            };

            const stopRecording = () => {
                if (mediaRecorderRef.current && isRecording) {
                    mediaRecorderRef.current.stop();
                    setIsRecording(false);
                }
            };

            const saveMessage = async () => {
                if (!mediaBlob || !guestName.trim() || !window.FirebaseBridge.isReady) return;
                
                if (mediaBlob.size > MAX_SIZE_BYTES) {
                    alert("Le message est trop long pour être sauvegardé (max ~20-30 sec en vidéo).");
                    return;
                }

                setIsUploading(true);
                const reader = new FileReader();
                reader.readAsDataURL(mediaBlob);
                reader.onloadend = async () => {
                    try {
                        const { db, collection, addDoc, Timestamp } = window.FirebaseBridge;
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {
                            name: guestName,
                            mediaData: reader.result,
                            type: mediaMode,
                            timestamp: Timestamp.now(),
                            userId: user?.uid || 'anonymous'
                        });
                        
                        setMediaURL(null);
                        setMediaBlob(null);
                        setGuestName('');
                        setIsUploading(false);
                        alert("Message envoyé ! ❤️");
                    } catch (e) { 
                        console.error("Firestore Error:", e);
                        alert("Erreur lors de l'envoi. Le fichier est peut-être trop lourd."); 
                        setIsUploading(false); 
                    }
                };
            };

            const fileSizeInfo = mediaBlob ? (mediaBlob.size / 1024).toFixed(0) : 0;
            const isTooLarge = mediaBlob && mediaBlob.size > MAX_SIZE_BYTES;

            return (
                <div className="p-4 md:p-8 max-w-2xl mx-auto">
                    <header className="text-center mb-8">
                        <div className="flex justify-center mb-4 text-rose-500">
                            <div className="bg-rose-100 p-3 rounded-full shadow-inner animate-bounce">
                                <IconHeart />
                            </div>
                        </div>
                        <h1 className="text-3xl font-serif font-bold text-slate-800">Livre d'Or Virtuel</h1>
                    </header>

                    <nav className="flex gap-2 mb-8 bg-white p-1 rounded-xl shadow-sm">
                        <button onClick={() => setView('record')} className={`flex-1 py-2 rounded-lg ${view === 'record' ? 'bg-rose-500 text-white' : 'text-slate-400'}`}>Enregistrer</button>
                        <button onClick={() => setView('listen')} className={`flex-1 py-2 rounded-lg ${view === 'listen' ? 'bg-rose-500 text-white' : 'text-slate-400'}`}>Archives</button>
                    </nav>

                    <main>
                        {view === 'record' ? (
                            <div className="bg-white rounded-3xl shadow-xl p-6 border border-slate-100 text-center">
                                {!mediaURL ? (
                                    <>
                                        <input 
                                            value={guestName} 
                                            onChange={(e) => setGuestName(e.target.value)}
                                            className="w-full px-4 py-3 rounded-xl border mb-6 outline-none focus:border-rose-300"
                                            placeholder="Votre nom..."
                                        />
                                        <div className="flex bg-slate-100 p-1 rounded-lg mb-6">
                                            <button onClick={() => setMediaMode('audio')} className={`flex-1 py-2 rounded-md ${mediaMode === 'audio' ? 'bg-white shadow' : ''}`}>Audio</button>
                                            <button onClick={() => setMediaMode('video')} className={`flex-1 py-2 rounded-md ${mediaMode === 'video' ? 'bg-white shadow' : ''}`}>Vidéo</button>
                                        </div>
                                        <div className="flex flex-col items-center">
                                            {mediaMode === 'video' && isRecording && (
                                                <video ref={videoPreviewRef} autoPlay muted className="w-full max-w-[320px] aspect-video bg-black rounded-xl mb-4 mirror-mode object-cover"></video>
                                            )}
                                            <button
                                                onClick={isRecording ? stopRecording : startRecording}
                                                disabled={!guestName.trim()}
                                                className={`w-20 h-20 rounded-full flex items-center justify-center text-white shadow-lg ${isRecording ? 'bg-slate-800 animate-pulse' : 'bg-rose-500'}`}
                                            >
                                                {isRecording ? <IconSquare /> : (mediaMode === 'audio' ? <IconMic /> : <IconVideo />)}
                                            </button>
                                            <p className="mt-4 text-slate-400 text-sm font-bold">{isRecording ? "ENREGISTREMENT..." : "CLIQUEZ POUR FILMER"}</p>
                                        </div>
                                    </>
                                ) : (
                                    <div className="space-y-6">
                                        <div className="bg-slate-900 rounded-2xl overflow-hidden">
                                            {mediaMode === 'video' ? <video src={mediaURL} controls className="w-full"></video> : <audio src={mediaURL} controls className="w-full p-4"></audio>}
                                        </div>
                                        <div className="text-xs text-slate-400">
                                            Taille estimée : <span className={isTooLarge ? 'text-rose-500 font-bold' : ''}>{fileSizeInfo} KB / 1000 KB</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => setMediaURL(null)} className="flex-1 py-3 border rounded-xl">Recommencer</button>
                                            <button 
                                                onClick={saveMessage} 
                                                disabled={isUploading || isTooLarge} 
                                                className="flex-1 py-3 bg-emerald-500 text-white rounded-xl font-bold disabled:opacity-50"
                                            >
                                                {isUploading ? "Envoi..." : "ENVOYER ❤️"}
                                            </button>
                                        </div>
                                        {isTooLarge && <p className="text-rose-500 text-xs italic">Message trop long, réduisez la durée.</p>}
                                    </div>
                                )}
                            </div>
                        ) : (
                            !isAuthenticated ? (
                                <div className="bg-white p-8 rounded-3xl text-center shadow-lg">
                                    <input type="password" value={pinInput} onChange={(e) => setPinInput(e.target.value)} placeholder="Code PIN" className="w-full p-3 border rounded-xl mb-4 text-center tracking-widest" />
                                    <button onClick={() => pinInput === ADMIN_PIN && setIsAuthenticated(true)} className="w-full py-3 bg-slate-800 text-white rounded-xl">Accéder</button>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    {messages.map(msg => (
                                        <div key={msg.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                                            <div className="flex justify-between items-center mb-2">
                                                <h4 className="font-bold">{msg.name}</h4>
                                                <span className="text-[10px] text-slate-400">{msg.timestamp?.toDate().toLocaleString()}</span>
                                            </div>
                                            {msg.type === 'video' ? <video src={msg.mediaData} controls className="w-full rounded-lg"></video> : <audio src={msg.mediaData} controls className="w-full"></audio>}
                                        </div>
                                    ))}
                                </div>
                            )
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
